[colors]
background = #AA000000
background-alt = #373B41
foreground = #FFFFFF
primary = #4c7899
secondary = #285577
alert = #900000
disabled = #707880

[global/wm]
margin-bottom=0
margin-top=0

[bar/main]
monitor = ${env:MONITOR:}
enable-scroll = false
width = 100%
height = 24pt
radius = 0
margin-bottom=0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "CaskaydiaMono Nerd Font Mono;3"

modules-left = i3 xwindow
modules-right = xkeyboard memory cpu wlan eth bridge date battery tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3
; override-redirect = true

[module/i3]
type = internal/i3
show-urgent = true
enable-scroll = false
label = %index%
label-focused = %index%
label-urgent = %index%
label-visible = %index%
label-unfocused = %index%
label-focused-background = #3f3f3f
label-focused-underline = ${colors.primary}
label-visible-foreground = ${colors.disabled}
label-urgent-background = ${colors.alert}
label-visible-padding = 1
label-focused-padding = 1
label-unfocused-padding = 1
label-urgent-padding = 1
index-sort = true
label-mode-background = ${colors.alert}
label-mode-padding = 1

[module/xworkspaces]
enable-scroll = false
show-urgent = true
; pin-workspaces = true


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %variant%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#4c7899}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#4c7899}W: %essid% %{F-}%local_ip%
label-disconnected = ""

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#4c7899}E:%{F-} %local_ip%
label-disconnected = ""


[module/bridge]
inherit = network-base
interface-type = wired
interface = bridge0
label-connected = %{F#4c7899}E (bridge):%{F-} %local_ip%
label-disconnected = ""


[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[module/tray]
type = internal/tray
; format-margin = 8pt
tray-spacing = 8pt

[settings]
screenchange-reload = true
pseudo-transparency = false

[module/battery]
type = internal/battery
label-full = %{F#4c7899}BAT%{F-} %percentage%%
label-charging = %{F#4c7899}CHR%{F-} %percentage%% (%time%)

; vim:ft=dosini
